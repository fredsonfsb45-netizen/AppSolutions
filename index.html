<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppSolutions - Gestão Gastronômica Profissional</title>
    <!-- Favicon BBQ -->
    <link rel="icon" href="https://fav.farm/🥩">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans antialiased">
    
    <!-- Auth Container (Exibido se não logado) -->
    <div id="auth-container" class="hidden fixed inset-0 bg-gray-900 bg-opacity-90 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="bg-red-600 p-8 text-white text-center">
                <h2 class="text-3xl font-extrabold tracking-tight">⚡ APPSOLUTIONS</h2>
                <p class="mt-2 text-red-100 opacity-90">Gestor Gastronômico Profissional</p>
            </div>
            
            <div class="p-8">
                <div id="login-form">
                    <h3 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Entrar no Sistema</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
                            <input type="email" id="auth_email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="seu@email.com">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                            <input type="password" id="auth_password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="••••••••">
                        </div>
                        <button onclick="handleLogin()" id="btn-login" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg shadow-lg active:transform active:scale-95 transition-all">
                            ACESSAR PAINEL
                        </button>
                        <p class="text-center text-sm text-gray-500 mt-4">
                            Novo por aqui? <button onclick="toggleAuthMode(true)" class="text-red-600 font-bold hover:underline">Criar uma Conta</button>
                        </p>
                    </div>
                </div>

                <div id="signup-form" class="hidden">
                    <h3 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Criar Novo Registro</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Nome do Estabelecimento</label>
                            <input type="text" id="reg_nome" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="Ex: Churrascaria do Bairro">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">E-mail do Restaurante</label>
                            <input type="email" id="reg_email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="email@negocio.com">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Senha Segura</label>
                            <input type="password" id="reg_password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="Mínimo 6 caracteres">
                        </div>
                        <button onclick="handleSignup()" id="btn-signup" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg active:transform active:scale-95 transition-all">
                            CADASTRAR E ENTRAR
                        </button>
                        <p class="text-center text-sm text-gray-500 mt-4">
                            Já tem conta? <button onclick="toggleAuthMode(false)" class="text-red-600 font-bold hover:underline">Voltar ao Login</button>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- App Content (Exibido se logado) -->
    <div id="app-wrapper" class="hidden">
        <!-- Navbar Header -->
        <nav class="bg-red-600 text-white shadow-lg sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col sm:flex-row items-center justify-between py-4 sm:h-20 gap-3">
                    <div class="flex items-center gap-4">
                    <div class="flex items-center gap-4">
                        <span id="app-brand-name" class="font-black text-2xl tracking-tighter uppercase italic">CHURRASCO B10</span>
                        <div class="h-8 w-[1px] bg-red-400 hidden sm:block"></div>
                        <span id="user-badge" class="hidden sm:inline text-xs bg-red-700 px-2 py-1 rounded text-red-100 font-medium truncate max-w-[150px]">...</span>
                    </div>
                        <div class="h-8 w-[1px] bg-red-400 hidden sm:block"></div>
                        <span id="user-badge" class="hidden sm:inline text-xs bg-red-700 px-2 py-1 rounded text-red-100 font-medium truncate max-w-[150px]">...</span>
                    </div>
                    <div class="flex flex-wrap justify-center gap-2">
                        <button id="nav-master" onclick="renderMaster()" class="hidden bg-black text-yellow-400 border border-yellow-600 px-4 py-2 rounded-md text-sm font-black transition-all shadow-lg animate-pulse">👑 CENTRAL MASTER</button>
                        <button onclick="setMode('garcom')" class="bg-red-700 hover:bg-red-800 border border-red-500 px-4 py-2 rounded-md text-sm font-bold transition-all shadow-sm">🧑‍🍳 Garçom</button>
                        <button onclick="setMode('cozinha')" class="bg-red-700 hover:bg-red-800 border border-red-500 px-4 py-2 rounded-md text-sm font-bold transition-all shadow-sm">🔥 Cozinha</button>
                        <button onclick="acessarDono()" class="bg-gray-800 hover:bg-gray-900 border border-gray-700 px-4 py-2 rounded-md text-sm font-bold transition-all shadow-sm">📈 Dono</button>
                        <button onclick="handleLogout()" class="bg-white text-red-600 hover:bg-red-50 px-3 py-2 rounded-md text-sm font-black transition-all shadow-sm border border-red-200">SAIR</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Alertas -->
        <div id="alert-container" class="fixed top-24 right-4 z-50 pointer-events-none"></div>

        <!-- Main Content Container -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-[70vh]" id="main-content">
            <h2 class="text-center text-gray-500 mt-10 tracking-widest animate-pulse font-black">CARREGANDO SISTEMA APPSOLUTIONS...</h2>
        </main>

        <!-- Footer AppSolutions -->
        <footer class="bg-gray-100 border-t border-gray-200 py-8 mt-12">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-gray-400 text-xs font-bold tracking-widest uppercase mb-2">Plataforma de Gestão Gastronômica</p>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-gray-900 font-extrabold text-sm tracking-tighter italic">APPSOLUTIONS</span>
                    <span class="h-4 w-[1px] bg-gray-300"></span>
                    <span class="text-gray-500 text-[10px] font-bold">Tecnologia para o seu negócio</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Nossa Lógica Principal JS ( ESM Module for Vite ) -->
    <script type="module" src="/app.js"></script>

</body>
</html>
